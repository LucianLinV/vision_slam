%YAML:1.0

# 相机内参，当前默认使用 TUM fr1 的参数。
camera.fx: 520.9
camera.fy: 521.0
camera.cx: 325.1
camera.cy: 249.7
camera.depth_scale: 5000.0

# 数据集路径。
dataset.root: "./sources/TUM"
dataset.association_file: "./sources/TUM/associate.txt"

# 特征提取和匹配参数。
feature.detector: "FAST"
feature.fast_threshold: 20
feature.max_features: 1000
feature.min_distance: 20
feature.orb_features: 500
feature.match_ratio: 0.8

# 跟踪状态统计。
tracking.num_inliers: 0      # 当前帧跟踪成功的内点数量。
tracking.num_lost: 0         # 连续跟踪失败或丢失的次数。

# 跟踪和特征金字塔参数。
tracking.num_of_features: 1000  # 每帧期望提取或保留的特征点数量。
tracking.scale_factor: 1.2      # 图像金字塔相邻层之间的缩放倍率。
tracking.level_pyramid: 8       # 图像金字塔层数。
tracking.match_ratio: 0.8       # 特征匹配 ratio test 阈值，越小匹配越严格。
tracking.max_num_lost: 15      # 最大允许连续丢失帧数，超过后可认为跟踪失败。
tracking.min_inliers: 30        # 判定当前帧跟踪成功所需的最少内点数量。

# 关键帧插入阈值。
keyframe.min_rot: 0.1    # 插入关键帧所需的最小旋转变化，单位通常为弧度。
keyframe.min_trans: 0.1  # 插入关键帧所需的最小平移变化，单位通常为米。

# 稀疏直接法参数。
direct.patch_half_size: 2
direct.max_iterations: 20
direct.min_depth: 0.1
direct.max_depth: 10.0

# Bundle Adjustment 参数。
ba.max_iterations: 20
ba.robust_kernel_delta: 1.0
